name: CI/CD

on:
  push:
    branches: ["master", "dev"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore AiCV.sln

      - name: Build
        run: dotnet build AiCV.sln --no-restore

      - name: Test
        run: dotnet test AiCV.sln --no-build --verbosity normal

  staging:
    name: 🏗️ Staging (Version & PR)
    needs: build-and-test
    # Run only on pushes to 'dev' branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev' && !contains(github.event.head_commit.message, '[skip staging]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "/!:|BREAKING CHANGE:/"
          minor_pattern: "/feat:/"
          version_format: "${major}.${minor}.${patch}"
          enable_prerelease_mode: false
          search_commit_body: true

      - name: Generate Changelog Entry
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          VERSION="${{ steps.version.outputs.version }}"

          echo "## [$VERSION] - $(date +%Y-%m-%d)" > /tmp/new_entry.md
          echo "" >> /tmp/new_entry.md

          RANGE="${PREV_TAG:+$PREV_TAG..HEAD}"
          RANGE="${RANGE:-HEAD}"

          FEATS=$(git log $RANGE --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
          if [ -n "$FEATS" ]; then
            echo "### Added" >> /tmp/new_entry.md
            echo "$FEATS" | sed 's/^feat[:(]*//' >> /tmp/new_entry.md
            echo "" >> /tmp/new_entry.md
          fi

          FIXES=$(git log $RANGE --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
          if [ -n "$FIXES" ]; then
            echo "### Fixed" >> /tmp/new_entry.md
            echo "$FIXES" | sed 's/^fix[:(]*//' >> /tmp/new_entry.md
            echo "" >> /tmp/new_entry.md
          fi

          if [ -z "$FEATS" ] && [ -z "$FIXES" ]; then
            echo "### Changed" >> /tmp/new_entry.md
            git log $RANGE --pretty=format:"- %s" -5 >> /tmp/new_entry.md
            echo "" >> /tmp/new_entry.md
          fi

          sed -i '/^## \[Unreleased\]/,/^---/{/^---/r /tmp/new_entry.md
          }' CHANGELOG.md

      - name: Sync Changelog to dev Branch
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add CHANGELOG.md
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "docs: update changelog for v${{ steps.version.outputs.version }} [skip staging]"
            git push origin HEAD:dev
          else
            echo "No changelog changes to sync."
          fi

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update changelog for v${{ steps.version.outputs.version }} [skip staging]"
          title: "🚀 PR: Release candidate v${{ steps.version.outputs.version }}"
          body: |
            ## 🚀 New Release Candidate

            This PR was automatically created from the `dev` branch. It includes the updated `CHANGELOG.md` for **v${{ steps.version.outputs.version }}**.

            **Review Checklist:**
            1. [ ] Code changes look correct.
            2. [ ] `CHANGELOG.md` accurately reflects the work.
            3. [ ] Ready for production?

            **Deployment Note:**
            Merging this PR into `master` will trigger the production build, Docker `latest` push, and official GitHub Tag/Release.
          branch: "dev-to-master-v${{ steps.version.outputs.version }}"
          base: "master"

  production:
    name: 🚀 Production Release
    needs: build-and-test
    # Run only on pushes (merges) to 'master'
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Merged Version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "/!:|BREAKING CHANGE:/"
          minor_pattern: "/feat:/"
          version_format: "${major}.${minor}.${patch}"
          enable_prerelease_mode: false
          search_commit_body: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aicv:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/aicv:latest

      - name: Tag Repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          if git rev-parse v${{ steps.version.outputs.version }} >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists. Skipping."
          else
            git tag v${{ steps.version.outputs.version }}
            git push origin v${{ steps.version.outputs.version }}
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 🚀 AiCV v${{ steps.version.outputs.version }}
          body: |
            ## ✨ AiCV Production Release - v${{ steps.version.outputs.version }}

            This release was automatically built and deployed to production.

            **Docker Hub:** `${{ secrets.DOCKER_USERNAME }}/aicv:latest`
            **Full Changelog**: https://github.com/FitimZulfiju/Ai-CV-application-generator/blob/master/CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-dockerhub:
    name: 🧹 Cleanup Docker Hub
    runs-on: ubuntu-latest
    needs: production
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: 🧹 Cleanup old Docker tags and digests
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y jq curl

          DOCKER_USER="${{ secrets.DOCKER_USERNAME }}"
          DOCKER_PASS="${{ secrets.DOCKER_PASSWORD }}"
          REPO="aicv"
          NS_REPO="${DOCKER_USER}/${REPO}"
          KEEP_LAST_N=2 # Keep latest + 2 versions = 3 total

          echo "============================================"
          echo "🧹 Docker Hub Cleanup Process for ${NS_REPO}"
          echo "Strategy: Keep 'latest' + ${KEEP_LAST_N} newest versions"
          echo "============================================"

          AUTH_RESPONSE=$(curl -s -H "Content-Type: application/json" \
            -X POST -d "{\"username\":\"${DOCKER_USER}\",\"password\":\"${DOCKER_PASS}\"}" \
            https://hub.docker.com/v2/users/login/)
          HUB_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.token // empty')

          if [ -z "$HUB_TOKEN" ]; then
            echo "❌ Failed to authenticate to Docker Hub"
            exit 1
          fi

          # Get a Registry API token for manifest deletion
          REGISTRY_URL="https://auth.docker.io/token?service=registry.docker.io&scope=repository:${NS_REPO}:pull,push,delete"
          REGISTRY_TOKEN=$(curl -s -u "${DOCKER_USER}:${DOCKER_PASS}" "$REGISTRY_URL" | jq -r '.token // empty')

          # Fetch all tags with their digests
          TAGS_JSON=$(mktemp)
          URL="https://hub.docker.com/v2/repositories/${NS_REPO}/tags/?page_size=100&ordering=-last_updated"
          echo "[]" > "$TAGS_JSON"

          while [ -n "${URL:-}" ] && [ "$URL" != "null" ]; do
            PAGE=$(curl -s -H "Authorization: Bearer $HUB_TOKEN" "$URL")
            if [ -z "$PAGE" ] || [ "$PAGE" = "null" ]; then break; fi
            jq -s '.[0] + .[1].results' "$TAGS_JSON" <(echo "$PAGE") > "${TAGS_JSON}.tmp" && mv "${TAGS_JSON}.tmp" "$TAGS_JSON"
            URL=$(echo "$PAGE" | jq -r '.next // empty')
          done

          # Identify tags to keep
          KEEP_TAGS=$(jq -r --arg KEEP_N "$KEEP_LAST_N" '
            (map(select(.name == "latest"))) + 
            (map(select(.name != "latest")) | sort_by(.last_updated) | reverse | .[0:($KEEP_N|tonumber)]) 
            | map(.name) | unique | .[]' "$TAGS_JSON")

          echo "🔒 Tags to keep: $(echo $KEEP_TAGS | tr '\n' ' ')"

          # Get unique digests for kept tags
          KEEP_DIGESTS=$(jq -r --argjson keep "$(echo "$KEEP_TAGS" | jq -R . | jq -s .)" '
            .[] | select(.name as $n | $keep | index($n)) | .images[].digest' "$TAGS_JSON" | sort -u)

          # Get all tags
          ALL_TAGS=$(jq -r '.[].name' "$TAGS_JSON")

          # Delete tags and manifests not in KEEP_TAGS/KEEP_DIGESTS
          for t in $ALL_TAGS; do
            if ! echo "$KEEP_TAGS" | grep -qxw "$t"; then
              # Get all digests associated with this tag
              TAG_DIGESTS=$(jq -r --arg t "$t" '.[] | select(.name == $t) | .images[].digest' "$TAGS_JSON" | sort -u)
              
              echo "🗑️ Deleting tag: ${t}"
              curl -s -X DELETE -H "Authorization: Bearer $HUB_TOKEN" \
                "https://hub.docker.com/v2/repositories/${NS_REPO}/tags/${t}/" > /dev/null
              
              # Now check if we should delete the associated manifests
              if [ -n "$REGISTRY_TOKEN" ]; then
                for d in $TAG_DIGESTS; do
                  if ! echo "$KEEP_DIGESTS" | grep -qxw "$d"; then
                    echo "  🗑️ Deleting orphaned manifest: ${d}"
                    curl -s -X DELETE -H "Authorization: Bearer $REGISTRY_TOKEN" \
                      -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
                      "https://registry-1.docker.io/v2/${NS_REPO}/manifests/${d}" > /dev/null || true
                  fi
                done
              fi
            fi
          done
          echo "🧹 Cleanup complete."
