name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore AiCV.sln

      - name: Build
        run: dotnet build AiCV.sln --no-restore

      - name: Test
        run: dotnet test AiCV.sln --no-build --verbosity normal

  staging:
    name: 🏗️ Staging (Version & PR)
    needs: build-and-test
    # Run only on pushes to branches that ARE NOT master/main
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip staging]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "/!:|BREAKING CHANGE:/"
          minor_pattern: "/feat:/"
          version_format: "${major}.${minor}.${patch}"
          enable_prerelease_mode: false
          search_commit_body: true

      - name: Generate Changelog Entry
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VERSION="${{ steps.version.outputs.version }}"

          echo "## [$VERSION] - $(date +%Y-%m-%d)" > /tmp/new_entry.md
          echo "" >> /tmp/new_entry.md

          RANGE="${PREV_TAG:+$PREV_TAG..HEAD}"
          RANGE="${RANGE:-HEAD}"

          FEATS=$(git log $RANGE --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
          if [ -n "$FEATS" ]; then
            echo "### Added" >> /tmp/new_entry.md
            echo "$FEATS" | sed 's/^feat[:(]*//' >> /tmp/new_entry.md
            echo "" >> /tmp/new_entry.md
          fi

          FIXES=$(git log $RANGE --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
          if [ -n "$FIXES" ]; then
            echo "### Fixed" >> /tmp/new_entry.md
            echo "$FIXES" | sed 's/^fix[:(]*//' >> /tmp/new_entry.md
            echo "" >> /tmp/new_entry.md
          fi

          if [ -z "$FEATS" ] && [ -z "$FIXES" ]; then
            echo "### Changed" >> /tmp/new_entry.md
            git log $RANGE --pretty=format:"- %s" -5 >> /tmp/new_entry.md
            echo "" >> /tmp/new_entry.md
          fi

          sed -i '/^## \[Unreleased\]/,/^---/{/^---/r /tmp/new_entry.md
          }' CHANGELOG.md

      - name: Commit Changelog to Branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update changelog for v${{ steps.version.outputs.version }} [skip staging]"
          file_pattern: "CHANGELOG.md"

      - name: Create / Update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: prepare release PR [skip staging]"
          title: "🚀 PR: Release candidate v${{ steps.version.outputs.version }}"
          body: |
            ## 🚀 New Release Candidate

            This PR was automatically created to help you review the changes before merging to production.

            **Summary:**
            - Version: `v${{ steps.version.outputs.version }}`
            - Changelog: Updated in this branch.
            - Deployment: Merging this will trigger the production build and push to Docker Hub.

            Review the code and merge when ready!
          branch-suffix: "timestamp"
          base: "master"

  production:
    name: 🚀 Production Release
    needs: build-and-test
    # Run only on pushes to master (e.g. Merges)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Merged Version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "/!:|BREAKING CHANGE:/"
          minor_pattern: "/feat:/"
          version_format: "${major}.${minor}.${patch}"
          enable_prerelease_mode: false

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aicv:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/aicv:latest

      - name: Tag Repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 🚀 AiCV v${{ steps.version.outputs.version }}
          body: |
            ## ✨ AiCV Production Release - v${{ steps.version.outputs.version }}

            This release was automatically built and deployed to production.

            **Docker Hub:** `${{ secrets.DOCKER_USERNAME }}/aicv:latest`
            **Full Changelog**: https://github.com/FitimZulfiju/Ai-CV-application-generator/blob/master/CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-dockerhub:
    runs-on: ubuntu-latest
    needs: production
    if: success()
    steps:
      - name: 🧹 Cleanup old Docker tags
        shell: bash
        run: |
          # (Keep your existing cleanup script logic here)
          echo "Cleaning up..."
